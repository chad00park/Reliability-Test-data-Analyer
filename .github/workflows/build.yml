name: Build Executable

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # 최신 Node 환경과의 호환성을 위해 ubuntu-latest 대신 버전을 명시하여 안정화합니다.
    runs-on: ubuntu-22.04

    steps:
    # 1. 저장소 체크아웃 (최신 v4)
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 파이썬 환경 설정 (최신 v5)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. 필수 의존성 패키지 및 PyInstaller 최신화 설치
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl matplotlib pyinstaller

    # 4. PyInstaller를 이용한 단일 실행파일(.exe) 빌드
    # (윈도우용 exe를 리눅스 서버에서 안전하게 빌드하기 위해 pyinstaller 명령어 옵션을 정비합니다)
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole main.py

    # 5. 빌드 완료된 결과물 업로드 (기존 v2/v3 구버전 에러 유발 원인 -> 최신 v4로 변경)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DataAnalysisApp-exe
        path: dist/
